<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday 🎉</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #ff9a9e, #fad0c4);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .box {
            width: 150px;
            height: 150px;
            background: #ff6f91;
            position: relative;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .box:hover {
            transform: scale(1.05);
        }

        /* Lid */
        .lid {
            position: absolute;
            width: 150px;
            height: 40px;
            background: #ff3e6c;
            top: -30px;
            left: 0;
            border-radius: 10px;
            transition: 0.5s;
        }

        /* Ribbon */
        .ribbon {
            position: absolute;
            width: 20px;
            height: 150px;
            background: white;
            left: 50%;
            transform: translateX(-50%);
        }

        .label {
            margin-top: 20px;
            color: white;
            font-size: 16px;
        }

        /* Message Card  */
        .card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90%;
            max-width: 400px;
            padding: 25px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            transition: 0.4s;
            z-index: 10;
            overflow-wrap: break-word;
            box-sizing: border-box;
        }

        .card.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .card h1 {
            margin: 0;
            color: #ff3e6c;
            font-size: 1.5rem;
        }

        .card p {
            margin-top: 15px;
            font-size: 1rem;
            color: #444;
            line-height: 1.5;
        }

        @media (max-width: 500px) {
            .card h1 {
                font-size: 1.3rem;
            }

            .card p {
                font-size: 0.95rem;
                padding: 0 5px;
            }
        }

        /* Overlay */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            top: 0;
            left: 0;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        /* Floating Balloons */
        .balloon {
            position: fixed;
            bottom: -100px;
            width: 40px;
            height: 50px;
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            to {
                transform: translateY(-120vh);
            }
        }
    </style>
</head>

<body>

    <div>
        <div class="box" onclick="openGift()">
            <div class="lid" id="lid"></div>
            <div class="ribbon"></div>
        </div>
        <div class="label">🎁 Tap the gift</div>
    </div>

    <div class="overlay" id="overlay" onclick="closeGift()"></div>

    <div class="card" id="card">
        <h1>Happy Birthday Tita! 🎂💖</h1>
        <p>
            May your day be filled with love, joy, and everything that makes you smile.
            Wishing you good health, happiness, and many more blessings,
            God bless you always.
        </p>
    </div>


    <script>
        function openGift() {
            document.getElementById("card").classList.add("show");
            document.getElementById("overlay").classList.add("show");
            document.getElementById("lid").style.transform = "rotate(-25deg) translateY(-20px)";
            createBalloons();
        }

        function closeGift() {
            document.getElementById("card").classList.remove("show");
            document.getElementById("overlay").classList.remove("show");
        }

        /* Balloons */
        function createBalloons() {
            for (let i = 0; i < 15; i++) {
                let b = document.createElement("div");
                b.classList.add("balloon");

                b.style.left = Math.random() * 100 + "vw";
                b.style.background = ["#ff6f91", "#ffcc00", "#66ffcc", "#66a3ff"][Math.floor(Math.random() * 4)];
                b.style.animationDuration = (Math.random() * 3 + 3) + "s";

                document.body.appendChild(b);

                setTimeout(() => b.remove(), 6000);
            }
        }
    </script>

</body>

</html>
