<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pump Control</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    width: 380px;
    backdrop-filter: blur(20px);
    background: rgba(30, 41, 59, 0.6);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.05);
  }

  h2 {
    text-align: center;
    margin-bottom: 15px;
    font-weight: 600;
  }

  .section {
    margin: 18px 0;
  }

  .section h3 {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 8px;
  }

  button {
    transition: all 0.2s ease;
  }

  .pump-buttons button {
    width: 100%;
    margin-bottom: 10px;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #1e293b;
    color: white;
    font-size: 15px;
    cursor: pointer;
  }

  .pump-buttons button:hover {
    background: #334155;
  }

  .active {
    background: linear-gradient(135deg, #22c55e, #16a34a) !important;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .grid button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #1e293b;
    color: white;
    cursor: pointer;
  }

  .grid button:hover {
    background: #334155;
  }

  .priming-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    font-size: 15px;
    cursor: pointer;
  }

  .priming-btn:hover {
    transform: scale(1.04);
  }

  .send-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
  }

  .send-btn:hover {
    transform: scale(1.04);
  }

  .status {
    margin-top: 15px;
    text-align: center;
    font-size: 13px;
    color: #94a3b8;
  }

  .preview {
    margin-top: 10px;
    font-size: 12px;
    color: #38bdf8;
    text-align: center;
  }

</style>
</head>

<body>

<div class="container">

  <h2>🧪 Pump Control</h2>

  <!-- Pump -->
  <div class="section">
    <h3>Select Pump</h3>
    <div class="pump-buttons" id="pumpSection">
      <button onclick="selectPump(9, this)">Pump 1</button>
      <button onclick="selectPump(10, this)">Pump 2</button>
      <button onclick="selectPump(11, this)">Pump 3</button>
    </div>
  </div>

  <!-- Priming ONLY -->
  <div class="section">
    <h3>Quick Action</h3>
    <button class="priming-btn" onclick="sendPriming()">⚡ Priming</button>
  </div>

  <!-- Revolutions -->
  <div class="section">
    <h3>Revolutions</h3>
    <div class="grid" id="revolutionButtons"></div>
  </div>

  <!-- Send -->
  <button class="send-btn" onclick="sendCommand()">🚀 Send Command</button>

  <div class="preview" id="preview"></div>
  <div class="status" id="status">Connecting...</div>

</div>

<script>

// ================= CONFIG =================
const wsUrl = "wss://app.labavendo.com/cable";
const masterId = "C700";

// ================= STATE =================
let selectedPump = null;
let selectedRevolution = null;
let socket;

// ================= INIT =================
const revContainer = document.getElementById("revolutionButtons");

// 🔥 NOW ONLY 1–5
for (let i = 1; i <= 5; i++) {
  let btn = document.createElement("button");
  btn.innerText = i;
  btn.onclick = () => selectRevolution(i, btn);
  revContainer.appendChild(btn);
}

// ================= WEBSOCKET =================
function connectWS() {
  socket = new WebSocket(wsUrl);

  socket.onopen = () => {
    setStatus("🟢 Connected");

    let subscribeMsg = {
      command: "subscribe",
      identifier: JSON.stringify({
        channel: "DirectMachineChannel",
        name: masterId
      })
    };

    socket.send(JSON.stringify(subscribeMsg));
  };

  socket.onclose = () => {
    setStatus("🔴 Disconnected");
    setTimeout(connectWS, 3000);
  };

  socket.onerror = () => {
    setStatus("⚠️ Error");
  };
}

// ================= UI =================
function selectPump(id, btn) {
  selectedPump = id;

  document.querySelectorAll("#pumpSection button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  updatePreview();
}

function selectRevolution(val, btn) {
  selectedRevolution = val;

  document.querySelectorAll("#revolutionButtons button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  updatePreview();
}

function updatePreview() {
  if (selectedPump && selectedRevolution) {
    document.getElementById("preview").innerText =
      `Command: PulseC ${selectedPump} ${selectedRevolution} XXXXX`;
  }
}

function setStatus(text) {
  document.getElementById("status").innerText = text;
}

// ================= COMMAND =================
function generateTrackingId() {
  return Math.floor(Math.random() * 100000000);
}

function sendCommand() {
  if (!selectedPump || !selectedRevolution) {
    alert("Select pump and revolution first!");
    return;
  }
  sendPulse(selectedRevolution);
}

function sendPriming() {
  if (!selectedPump) {
    alert("Select pump first!");
    return;
  }

  sendPulse(5);
  setTimeout(() => sendPulse(5), 200); // slight delay to ensure delivery
}

function sendPulse(pulses) {

  if (!socket || socket.readyState !== WebSocket.OPEN) {
    alert("WebSocket not connected!");
    return;
  }

  let trackingId = generateTrackingId();
  let content = `PulseC ${selectedPump} ${pulses} ${trackingId}`;

  let payload = {
    command: "message",
    identifier: JSON.stringify({
      channel: "DirectMachineChannel",
      name: masterId
    }),
    data: JSON.stringify({
      action: "message",
      source: "web",
      device_id: masterId,
      content: content
    })
  };

  socket.send(JSON.stringify(payload));

  setStatus("📤 Sent: " + content);
}

// ================= START =================
connectWS();

</script>

</body>
</html>
