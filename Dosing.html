<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pump Control</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1f2937, #111827);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    width: 360px;
    background: #1f2937;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }

  h2 {
    text-align: center;
    margin-bottom: 10px;
  }

  .section {
    margin: 20px 0;
  }

  .section h3 {
    margin-bottom: 10px;
    font-size: 14px;
    color: #9ca3af;
  }

  .pump-buttons button {
    width: 100%;
    margin-bottom: 10px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #374151;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  .pump-buttons button:hover {
    background: #4b5563;
  }

  .active {
    background: #22c55e !important;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .grid button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #374151;
    color: white;
    cursor: pointer;
  }

  .grid button:hover {
    background: #4b5563;
  }

  /* NEW: side-by-side buttons */
  .row {
    display: flex;
    gap: 10px;
  }

  .priming-btn, .flush-btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.2s;
  }

  .priming-btn {
    background: linear-gradient(135deg, #22c55e, #16a34a);
  }

  .flush-btn {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
  }

  .priming-btn:hover,
  .flush-btn:hover {
    transform: scale(1.05);
  }

  .send-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
  }

  .send-btn:hover {
    transform: scale(1.05);
  }

  .status {
    margin-top: 15px;
    text-align: center;
    font-size: 13px;
    color: #9ca3af;
  }

  .preview {
    margin-top: 10px;
    font-size: 12px;
    color: #60a5fa;
    text-align: center;
  }

</style>
</head>

<body>

<div class="container">

  <h2>🧪 Pump Control</h2>

  <!-- Pump -->
  <div class="section">
    <h3>Select Pump</h3>
    <div class="pump-buttons" id="pumpSection">
      <button onclick="selectPump(9, this)">Pump 1</button>
      <button onclick="selectPump(10, this)">Pump 2</button>
      <button onclick="selectPump(11, this)">Pump 3</button>
    </div>
  </div>

  <!-- Priming + Flush -->
  <div class="section">
    <h3>Quick Actions</h3>
    <div class="row">
      <button class="priming-btn" onclick="sendPriming()">⚡ Priming</button>
      <button class="flush-btn" onclick="sendFlush()">💧 Flush</button>
    </div>
  </div>

  <!-- Revolutions -->
  <div class="section">
    <h3>Revolutions</h3>
    <div class="grid" id="revolutionButtons"></div>
  </div>

  <!-- Send -->
  <button class="send-btn" onclick="sendCommand()">🚀 Send Command</button>

  <div class="preview" id="preview"></div>
  <div class="status" id="status">Connecting...</div>

</div>

<script>

// ================= CONFIG =================
const wsUrl = "wss://app.labavendo.com/cable";
const masterId = "C700";

// ================= STATE =================
let selectedPump = null;
let selectedRevolution = null;
let socket;

// ================= INIT =================
const revContainer = document.getElementById("revolutionButtons");

for (let i = 1; i <= 10; i++) {
  let btn = document.createElement("button");
  btn.innerText = i;
  btn.onclick = () => selectRevolution(i, btn);
  revContainer.appendChild(btn);
}

// ================= WEBSOCKET =================
function connectWS() {
  socket = new WebSocket(wsUrl);

  socket.onopen = () => {
    setStatus("🟢 Connected");

    let subscribeMsg = {
      command: "subscribe",
      identifier: JSON.stringify({
        channel: "DirectMachineChannel",
        name: masterId
      })
    };

    socket.send(JSON.stringify(subscribeMsg));
  };

  socket.onclose = () => {
    setStatus("🔴 Disconnected");
    setTimeout(connectWS, 3000);
  };

  socket.onerror = () => {
    setStatus("⚠️ Error");
  };
}

// ================= UI =================
function selectPump(id, btn) {
  selectedPump = id;

  document.querySelectorAll("#pumpSection button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  updatePreview();
}

function selectRevolution(val, btn) {
  selectedRevolution = val;

  document.querySelectorAll("#revolutionButtons button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  updatePreview();
}

function updatePreview() {
  if (selectedPump && selectedRevolution) {
    document.getElementById("preview").innerText =
      `Command: PulseC ${selectedPump} ${selectedRevolution} XXXXX`;
  }
}

function setStatus(text) {
  document.getElementById("status").innerText = text;
}

// ================= COMMAND =================
function generateTrackingId() {
  return Math.floor(Math.random() * 100000000);
}

function sendCommand() {
  if (!selectedPump || !selectedRevolution) {
    alert("Select pump and revolution first!");
    return;
  }
  sendPulse(selectedRevolution);
}

function sendPriming() {
  if (!selectedPump) {
    alert("Select pump first!");
    return;
  }
  sendPulse(3);
}

// 🔥 NEW: Flush (10 revolutions)
function sendFlush() {
  if (!selectedPump) {
    alert("Select pump first!");
    return;
  }
  sendPulse(10);
}

function sendPulse(pulses) {

  if (!socket || socket.readyState !== WebSocket.OPEN) {
    alert("WebSocket not connected!");
    return;
  }

  let trackingId = generateTrackingId();
  let content = `PulseC ${selectedPump} ${pulses} ${trackingId}`;

  let payload = {
    command: "message",
    identifier: JSON.stringify({
      channel: "DirectMachineChannel",
      name: masterId
    }),
    data: JSON.stringify({
      action: "message",
      source: "web",
      device_id: masterId,
      content: content
    })
  };

  socket.send(JSON.stringify(payload));

  setStatus("📤 Sent: " + content);
}

// ================= START =================
connectWS();

</script>

</body>
</html>
